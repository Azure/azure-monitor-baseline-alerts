- name: SecretNearExpiry/SecretExpired
  description: Secret is near expiry or expired
  type: Log
  verified: false
  visible: true
  tags:
  - alz
  - rag
  properties:
    severity: 3
    operator: GreaterThan
    timeAggregation: Count
    windowSize: PT1H
    evaluationFrequency: PT1H
    threshold: 0
    dimensions:
    - name: SecretName
      operator: Include
      values:
      - '*'
    failingPeriods:
      numberOfEvaluationPeriods: 1
      minFailingPeriodsToAlert: 1
    query: 'AzureDiagnostics | where OperationName == "SecretNearExpiryEventGridNotification" or OperationName == "SecretExpiredEventGridNotification"'
    autoMitigate: true
    enabled: false
  references:
  - name: Monitoring KeyVault Reference
    url: https://docs.microsoft.com/en-us/azure/key-vault/general/monitor-key-vault-reference
  - name: Monitoring Microsoft.KeyVault/vaults
    url: https://docs.microsoft.com/en-us/azure/key-vault/general/monitor-key-vault
  deployments:
  - name: Deploy KeyVault Secret Expiry Alert
    template: Deploy-KV-SecretExpiry-Alert.json
    type: Policy
    tags:
    - alz
    properties:
      scope: Resource
      multiResource: true
  guid: 2f5f7b76-607c-4cc9-9121-5193974c37e6
